# Local development stack: MongoDB + backend API + frontend, all networked
# together. For production, you'll more likely deploy backend and frontend
# separately (see README) — this file is mainly for running everything on
# your own machine while you build/test.
version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/kal-luxury-wigs
    depends_on:
      - mongo
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
